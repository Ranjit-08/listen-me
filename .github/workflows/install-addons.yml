name: Install EKS Addons (run once after Terraform)

on:
  workflow_dispatch:

env:
  AWS_REGION:       ${{ secrets.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}

jobs:
  install-addons:
    name: Install ALB Controller & EBS CSI
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER_NAME

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: "3.14.0"

      # ── AWS Load Balancer Controller ──────────────────────────────
      - name: Add EKS Helm repo
        run: |
          helm repo add eks https://aws.github.io/eks-charts
          helm repo update

      - name: Install AWS Load Balancer Controller
        run: |
          # Get VPC ID
          VPC_ID=$(aws eks describe-cluster \
            --name $EKS_CLUSTER_NAME \
            --query "cluster.resourcesVpcConfig.vpcId" \
            --output text)

          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            -n kube-system \
            --set clusterName=$EKS_CLUSTER_NAME \
            --set serviceAccount.create=true \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set serviceAccount.annotations."eks\.amazonaws\.com/role-arn"=${{ secrets.ALB_CONTROLLER_ROLE_ARN }} \
            --set region=$AWS_REGION \
            --set vpcId=$VPC_ID \
            --wait

      - name: Verify ALB Controller
        run: |
          kubectl get deployment -n kube-system aws-load-balancer-controller
          echo "ALB Controller installed successfully"

      # ── Metrics Server (for kubectl top) ─────────────────────────
      - name: Install Metrics Server
        run: |
          kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml

      - name: Done
        run: |
          echo "════════════════════════════════════════════════"
          echo "  EKS addons installed!"
          echo "  Now run the 'Build & Deploy to EKS' workflow"
          echo "════════════════════════════════════════════════"
