apiVersion: batch/v1
kind: Job
metadata:
  name: listenme-db-init
  namespace: listenme
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: mysql-client
        image: mysql:8
        command:
        - sh
        - -c
        - |
          mysql -h $DB_HOST -u $DB_USER -p$DB_PASSWORD -e "CREATE DATABASE IF NOT EXISTS listenme;"
        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: listenme-secrets
              key: DB_HOST
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: listenme-secrets
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: listenme-secrets
              key: DB_PASSWORD
