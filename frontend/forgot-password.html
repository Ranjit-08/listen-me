<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password – AURA</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="bg-ambient"></div>

  <div class="auth-page">

    <!-- Step 1: Enter email -->
    <div class="auth-card" id="stepEmail">
      <div class="auth-logo"><a href="home.html">AURA</a></div>
      <h1 class="auth-title">Forgot Password</h1>
      <p class="auth-subtitle">Enter your email to receive a reset code</p>
      <div class="alert alert-error"   id="emailError"><span>⚠</span><span id="emailErrorMsg"></span></div>
      <div class="alert alert-success" id="emailSuccess"><span>✓</span><span>Reset code sent! Check your inbox.</span></div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="fpEmail" class="form-input" placeholder="you@example.com" onkeydown="if(event.key==='Enter')sendReset()" />
      </div>
      <button class="btn btn-primary w-full" id="sendResetBtn" onclick="sendReset()">Send Reset Code</button>
      <p class="auth-footer"><a href="login.html">← Back to Sign In</a></p>
    </div>

    <!-- Step 2: Enter OTP -->
    <div class="auth-card" id="stepCode" style="display:none;">
      <div class="auth-logo"><a href="home.html">AURA</a></div>
      <h1 class="auth-title">Enter Code</h1>
      <p class="auth-subtitle">We sent a 6-digit code to your email</p>
      <div class="alert alert-error" id="codeError"><span>⚠</span><span id="codeErrorMsg"></span></div>
      <div class="otp-group">
        <input class="otp-input" type="text" maxlength="1" id="c0" />
        <input class="otp-input" type="text" maxlength="1" id="c1" />
        <input class="otp-input" type="text" maxlength="1" id="c2" />
        <input class="otp-input" type="text" maxlength="1" id="c3" />
        <input class="otp-input" type="text" maxlength="1" id="c4" />
        <input class="otp-input" type="text" maxlength="1" id="c5" />
      </div>
      <button class="btn btn-primary w-full" onclick="verifyResetCode()">Verify Code</button>
      <p class="auth-footer"><a href="#" onclick="show('stepEmail');hide('stepCode')">← Back</a></p>
    </div>

    <!-- Step 3: New password -->
    <div class="auth-card" id="stepNewPass" style="display:none;">
      <div class="auth-logo"><a href="home.html">AURA</a></div>
      <h1 class="auth-title">New Password</h1>
      <p class="auth-subtitle">Choose a strong new password</p>
      <div class="alert alert-error" id="passError"><span>⚠</span><span id="passErrorMsg"></span></div>
      <div class="form-group">
        <label class="form-label">New Password</label>
        <div class="input-wrapper">
          <input type="password" id="newPass" class="form-input" placeholder="Min. 8 characters" />
          <span class="input-icon" onclick="togglePass('newPass',this)">👁</span>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm New Password</label>
        <div class="input-wrapper">
          <input type="password" id="confPass" class="form-input" placeholder="Repeat password" />
          <span class="input-icon" onclick="togglePass('confPass',this)">👁</span>
        </div>
      </div>
      <button class="btn btn-primary w-full" onclick="resetPassword()">Reset Password</button>
    </div>

  </div>

  <script src="js/api.js"></script>
  <script>
    let resetEmail = '', resetToken = '';

    function show(id) { document.getElementById(id).style.display = 'block'; }
    function hide(id) { document.getElementById(id).style.display = 'none'; }
    function togglePass(id, el) {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      el.textContent = inp.type === 'password' ? '👁' : '🙈';
    }

    ['c0','c1','c2','c3','c4','c5'].forEach((id,i,arr) => {
      const el = document.getElementById(id);
      el.addEventListener('input',   e => { if(e.target.value && i<arr.length-1) document.getElementById(arr[i+1]).focus(); });
      el.addEventListener('keydown', e => { if(e.key==='Backspace'&&!e.target.value&&i>0) document.getElementById(arr[i-1]).focus(); });
    });

    async function sendReset() {
      resetEmail = document.getElementById('fpEmail').value.trim();
      document.getElementById('emailError').classList.remove('show');
      if (!resetEmail) { document.getElementById('emailErrorMsg').textContent='Enter your email.'; document.getElementById('emailError').classList.add('show'); return; }
      const btn = document.getElementById('sendResetBtn');
      btn.disabled = true; btn.textContent = 'Sending...';
      try {
        const res = await API.post('/auth/forgot-password', { email: resetEmail });
        if (res.success) {
          document.getElementById('emailSuccess').classList.add('show');
          setTimeout(() => { hide('stepEmail'); show('stepCode'); }, 1000);
        } else {
          document.getElementById('emailErrorMsg').textContent = res.message||'Email not found.';
          document.getElementById('emailError').classList.add('show');
        }
      } catch(e) { document.getElementById('emailErrorMsg').textContent='Network error.'; document.getElementById('emailError').classList.add('show'); }
      btn.disabled = false; btn.textContent = 'Send Reset Code';
    }

    async function verifyResetCode() {
      const code = ['c0','c1','c2','c3','c4','c5'].map(id=>document.getElementById(id).value).join('');
      document.getElementById('codeError').classList.remove('show');
      if (code.length<6) { document.getElementById('codeErrorMsg').textContent='Enter all 6 digits.'; document.getElementById('codeError').classList.add('show'); return; }
      try {
        const res = await API.post('/auth/verify-reset-otp', { email: resetEmail, otp: code });
        if (res.success) { resetToken = res.resetToken; hide('stepCode'); show('stepNewPass'); }
        else { document.getElementById('codeErrorMsg').textContent=res.message||'Invalid code.'; document.getElementById('codeError').classList.add('show'); }
      } catch(e) { document.getElementById('codeErrorMsg').textContent='Network error.'; document.getElementById('codeError').classList.add('show'); }
    }

    async function resetPassword() {
      const newPass  = document.getElementById('newPass').value;
      const confPass = document.getElementById('confPass').value;
      document.getElementById('passError').classList.remove('show');
      if (newPass.length<8) { document.getElementById('passErrorMsg').textContent='Minimum 8 characters.'; document.getElementById('passError').classList.add('show'); return; }
      if (newPass!==confPass){ document.getElementById('passErrorMsg').textContent='Passwords do not match.'; document.getElementById('passError').classList.add('show'); return; }
      try {
        const res = await API.post('/auth/reset-password', { resetToken, newPassword: newPass });
        if (res.success) { alert('Password reset! Please sign in.'); window.location.href='login.html'; }
        else { document.getElementById('passErrorMsg').textContent=res.message||'Failed to reset.'; document.getElementById('passError').classList.add('show'); }
      } catch(e) { document.getElementById('passErrorMsg').textContent='Network error.'; document.getElementById('passError').classList.add('show'); }
    }
  </script>
</body>
</html>
