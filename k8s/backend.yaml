# ── Backend Deployment ────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: listenme-backend
  namespace: listenme
  labels:
    app: listenme-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: listenme-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: listenme-backend
    spec:
      containers:
        - name: backend
          # IMAGE is replaced by GitHub Actions with real ECR URL + commit SHA tag
          image: IMAGE_BACKEND
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: listenme-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu:    "250m"
            limits:
              memory: "512Mi"
              cpu:    "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds:       20
            failureThreshold:    3
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds:       10
            failureThreshold:    3
      terminationGracePeriodSeconds: 30

---
# ── Backend Service ───────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: listenme-backend-svc
  namespace: listenme
  labels:
    app: listenme-backend
spec:
  type: ClusterIP
  selector:
    app: listenme-backend
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP