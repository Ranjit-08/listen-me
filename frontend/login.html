<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — ListenMe</title>
  <link rel="stylesheet" href="shared.css" />
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-icon">🎧</div>
      Listen<span>Me</span>
    </div>

    <p style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);margin-bottom:6px;">Welcome back</p>
    <p class="auth-subtitle">Sign in to continue listening.</p>

    <div class="alert alert-error"   id="err"></div>
    <div class="alert alert-info"    id="info"></div>
    <div class="alert alert-success" id="suc"></div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="password-wrap">
        <input type="password" id="password" placeholder="Your password" autocomplete="current-password" />
        <span class="toggle-pw" onclick="togglePw()">👁</span>
      </div>
    </div>

    <div style="text-align:right;margin:-10px 0 20px;">
      <a href="forgot-password.html" style="font-size:12px;color:var(--muted);text-decoration:none;transition:color 0.2s;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">Forgot password?</a>
    </div>

    <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">
      <span id="loginText">Sign In</span>
      <div class="spinner" id="loginSpinner"></div>
    </button>

    <div class="link-row" style="margin-top:22px;">
      No account? <a href="signup.html">Create one free</a>
    </div>
    <div class="link-row" style="margin-top:10px;">
      <a href="index.html" style="color:var(--muted);font-size:13px;">← Back to home</a>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script>
if (localStorage.getItem('token')) window.location.href = 'play.html';

function togglePw() {
  const i = document.getElementById('password');
  const s = document.querySelector('.toggle-pw');
  i.type = i.type === 'password' ? 'text' : 'password';
  s.textContent = i.type === 'password' ? '👁' : '🙈';
}

function show(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.style.display = 'block';
  el.style.animation='none'; requestAnimationFrame(()=>el.style.animation='');
}
function hideAll() { ['err','info','suc'].forEach(id=>document.getElementById(id).style.display='none'); }

function setLoad(on) {
  document.getElementById('loginText').style.display    = on ? 'none':'inline';
  document.getElementById('loginSpinner').style.display = on ? 'block':'none';
  document.getElementById('loginBtn').disabled          = on;
}

async function doLogin() {
  hideAll();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) return show('err','Please enter your email and password.');
  setLoad(true);
  try {
    const data = await api.post('/auth/login', { email, password }, false);
    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));
    window.location.href = 'play.html';
  } catch(e) {
    if (e.needs_verify) {
      show('info','Email not verified yet. Please complete signup first.');
    } else {
      show('err', e.error || 'Incorrect email or password. Please try again.');
    }
  } finally { setLoad(false); }
}
document.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
</script>
</body>
</html>
