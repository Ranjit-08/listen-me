# ──────────────────────────────────────────────────────────────────
# secrets.yaml  —  DO NOT COMMIT with real values
# GitHub Actions renders this template and applies it.
# All {{ PLACEHOLDER }} values come from GitHub Actions secrets.
# ──────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: listenme-secrets
  namespace: listenme
type: Opaque
stringData:
  DB_HOST:       "{{ DB_HOST }}"
  DB_USER:       "{{ DB_USER }}"
  DB_PASSWORD:   "{{ DB_PASSWORD }}"
  DB_NAME:       "listenme"
  DB_PORT:       "3306"
  SECRET_KEY:    "{{ SECRET_KEY }}"
  S3_BUCKET:     "{{ S3_BUCKET }}"
  S3_REGION:     "{{ AWS_REGION }}"
  AWS_ACCESS_KEY: "{{ AWS_ACCESS_KEY_ID }}"
  AWS_SECRET_KEY: "{{ AWS_SECRET_ACCESS_KEY }}"
  MAIL_SERVER:   "smtp.gmail.com"
  MAIL_PORT:     "587"
  MAIL_USERNAME: "{{ MAIL_USERNAME }}"
  MAIL_PASSWORD: "{{ MAIL_PASSWORD }}"
  ADMIN_EMAIL:   "{{ ADMIN_EMAIL }}"
  FRONTEND_URL:  "{{ FRONTEND_URL }}"
  APP_URL:       "{{ FRONTEND_URL }}"