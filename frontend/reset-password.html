<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — ListenMe</title>
  <link rel="stylesheet" href="shared.css" />
  <style>
    .icon-ring {
      width: 72px; height: 72px; border-radius: 50%;
      background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; margin: 0 auto 24px;
      animation: iconPop 0.5s 0.2s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes iconPop {
      from { opacity:0; transform:scale(0.4) rotate(-20deg); }
      to   { opacity:1; transform:scale(1) rotate(0); }
    }
  </style>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card" style="text-align:center;" id="mainCard">

    <div class="icon-ring">🔒</div>
    <div class="auth-logo" style="justify-content:center;">New <span>Password</span></div>
    <p class="auth-subtitle">Choose a strong password for your account.</p>

    <div class="alert alert-error"   id="err"></div>
    <div class="alert alert-success" id="suc"></div>

    <div class="form-group" style="text-align:left;">
      <label>New Password</label>
      <div class="password-wrap">
        <input type="password" id="pw1" placeholder="Min. 6 characters" oninput="checkStrength(this.value)" />
        <span class="toggle-pw" onclick="tgl('pw1',this)">👁</span>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="sBar"></div></div>
      <div class="strength-label" id="sLabel"></div>
    </div>

    <div class="form-group" style="text-align:left;">
      <label>Confirm Password</label>
      <div class="password-wrap">
        <input type="password" id="pw2" placeholder="Repeat password" />
        <span class="toggle-pw" onclick="tgl('pw2',this)">👁</span>
      </div>
    </div>

    <button class="btn btn-primary" id="btn" onclick="doReset()">
      <span id="btnText">Set New Password</span>
      <div class="spinner" id="btnSpinner"></div>
    </button>
  </div>

  <!-- Invalid token state -->
  <div class="auth-card" id="invalidCard" style="display:none;text-align:center;">
    <div style="font-size:48px;margin-bottom:20px;">⏰</div>
    <div class="auth-logo" style="justify-content:center;">Link <span>Expired</span></div>
    <p class="auth-subtitle">This reset link has expired or already been used.</p>
    <a href="forgot-password.html" class="btn btn-primary" style="margin-top:8px;">Request new link</a>
    <div class="link-row" style="margin-top:16px;"><a href="login.html">Back to Sign In</a></div>
  </div>
</div>

<script src="config.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const token  = params.get('token');
if (!token) {
  document.getElementById('mainCard').style.display   = 'none';
  document.getElementById('invalidCard').style.display = 'block';
}

function tgl(id, el) {
  const i = document.getElementById(id);
  i.type = i.type==='password'?'text':'password';
  el.textContent = i.type==='password'?'👁':'🙈';
}

function checkStrength(v) {
  const bar=document.getElementById('sBar'), lbl=document.getElementById('sLabel');
  let s=0;
  if(v.length>=6)s++; if(v.length>=10)s++;
  if(/[A-Z]/.test(v)&&/[0-9]/.test(v))s++;
  if(/[^A-Za-z0-9]/.test(v))s++;
  const m=[{w:'0%',c:'transparent',t:''},{w:'25%',c:'#f43f5e',t:'Weak'},{w:'50%',c:'#f59e0b',t:'Fair'},{w:'75%',c:'#10b981',t:'Good'},{w:'100%',c:'#10b981',t:'Strong'}];
  const r=m[s]||m[0];
  bar.style.width=r.w; bar.style.background=r.c; lbl.textContent=r.t; lbl.style.color=r.c;
}

function setLoad(on) {
  document.getElementById('btnText').style.display    = on?'none':'inline';
  document.getElementById('btnSpinner').style.display = on?'block':'none';
  document.getElementById('btn').disabled             = on;
}

async function doReset() {
  ['err','suc'].forEach(id=>document.getElementById(id).style.display='none');
  const pw1=document.getElementById('pw1').value;
  const pw2=document.getElementById('pw2').value;
  if(!pw1||!pw2) { const e=document.getElementById('err'); e.textContent='Please fill in both fields.'; e.style.display='block'; return; }
  if(pw1.length<6) { const e=document.getElementById('err'); e.textContent='Password must be at least 6 characters.'; e.style.display='block'; return; }
  if(pw1!==pw2) { const e=document.getElementById('err'); e.textContent='Passwords do not match.'; e.style.display='block'; return; }
  setLoad(true);
  try {
    await api.post('/auth/reset-password',{token,password:pw1},false);
    const s=document.getElementById('suc');
    s.textContent='✓ Password updated! Redirecting to sign in…'; s.style.display='block';
    setTimeout(()=>window.location.href='login.html',1800);
  } catch(e) {
    if(e.error&&(e.error.includes('expired')||e.error.includes('invalid'))) {
      document.getElementById('mainCard').style.display='none';
      document.getElementById('invalidCard').style.display='block';
    } else {
      const el=document.getElementById('err'); el.textContent=e.error||'Reset failed. Please try again.'; el.style.display='block';
    }
  } finally { setLoad(false); }
}
</script>
</body>
</html>
