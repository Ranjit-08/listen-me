<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AURA – Premium Music</title>
  <link rel="stylesheet" href="css/splash.css" />
</head>
<body>
  <div class="splash-container" id="splash">
    <div class="particles" id="particles"></div>
    <div class="logo-wrapper">
      <svg class="logo-svg" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#f5d485"/>
            <stop offset="50%" style="stop-color:#c9a84c"/>
            <stop offset="100%" style="stop-color:#8a6523"/>
          </linearGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <circle class="ring ring-1" cx="60" cy="60" r="55" stroke="url(#goldGrad)" stroke-width="0.5" fill="none" stroke-dasharray="4 6"/>
        <circle class="ring ring-2" cx="60" cy="60" r="48" stroke="url(#goldGrad)" stroke-width="0.3" fill="none" opacity="0.4"/>
        <path class="wave w1" d="M30 60 Q40 40 50 60 Q60 80 70 60 Q80 40 90 60" stroke="url(#goldGrad)" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#glow)"/>
        <path class="wave w2" d="M20 60 Q35 30 50 60 Q65 90 80 60 Q95 30 100 60" stroke="url(#goldGrad)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
        <circle class="center-dot" cx="60" cy="60" r="4" fill="url(#goldGrad)" filter="url(#glow)"/>
      </svg>
      <div class="brand-name">AURA</div>
      <div class="brand-tagline">Feel Every Note</div>
    </div>
    <div class="loading-bar">
      <div class="loading-fill" id="loadFill"></div>
    </div>
  </div>

  <script>
    // Particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 60; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${Math.random()*3+1}px;height:${Math.random()*3+1}px;animation-delay:${Math.random()*4}s;animation-duration:${Math.random()*6+4}s;opacity:${Math.random()*0.6+0.1};`;
      container.appendChild(p);
    }
    // Loading bar then redirect
    let progress = 0;
    const fill = document.getElementById('loadFill');
    const interval = setInterval(() => {
      progress += Math.random() * 15;
      if (progress >= 100) {
        progress = 100;
        fill.style.width = '100%';
        clearInterval(interval);
        setTimeout(() => {
          document.getElementById('splash').classList.add('fade-out');
          setTimeout(() => { window.location.href = 'home.html'; }, 600);
        }, 400);
      } else {
        fill.style.width = progress + '%';
      }
    }, 120);
  </script>
</body>
</html>
