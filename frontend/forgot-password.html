<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — ListenMe</title>
  <link rel="stylesheet" href="shared.css" />
  <style>
    .icon-ring {
      width: 72px; height: 72px; border-radius: 50%;
      background: rgba(124,58,237,0.1); border: 1px solid rgba(124,58,237,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; margin: 0 auto 24px;
      animation: iconPop 0.5s 0.2s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes iconPop {
      from { opacity:0; transform:scale(0.4) rotate(-20deg); }
      to   { opacity:1; transform:scale(1) rotate(0); }
    }
  </style>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card" style="text-align:center;">

    <div class="icon-ring">🔑</div>
    <div class="auth-logo" style="justify-content:center;">Forgot <span>Password?</span></div>
    <p class="auth-subtitle">Enter your email and we'll send a reset link.</p>

    <div class="alert alert-error"   id="err"></div>
    <div class="alert alert-success" id="suc"></div>

    <div class="form-group" style="text-align:left;">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
    </div>

    <button class="btn btn-primary" id="btn" onclick="doForgot()">
      <span id="btnText">Send Reset Link</span>
      <div class="spinner" id="btnSpinner"></div>
    </button>

    <div class="link-row" style="margin-top:22px;">
      Remembered it? <a href="login.html">Sign in</a>
    </div>
    <div class="link-row" style="margin-top:10px;">
      <a href="index.html" style="color:var(--muted);font-size:13px;">← Home</a>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script>
function setLoad(on) {
  document.getElementById('btnText').style.display    = on?'none':'inline';
  document.getElementById('btnSpinner').style.display = on?'block':'none';
  document.getElementById('btn').disabled             = on;
}
async function doForgot() {
  ['err','suc'].forEach(id=>document.getElementById(id).style.display='none');
  const email = document.getElementById('email').value.trim();
  if (!email) {
    const e=document.getElementById('err'); e.textContent='Please enter your email.'; e.style.display='block'; return;
  }
  setLoad(true);
  try {
    await api.post('/auth/forgot-password',{email},false);
    const s=document.getElementById('suc');
    s.textContent='✓ Reset link sent! Check your inbox (and spam).'; s.style.display='block';
    document.getElementById('email').value='';
  } catch(e) {
    const el=document.getElementById('err'); el.textContent=e.error||'Something went wrong. Please try again.'; el.style.display='block';
  } finally { setLoad(false); }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doForgot();});
</script>
</body>
</html>
