apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: listenme-ingress
  namespace: listenme
  annotations:
    kubernetes.io/ingress.class:                "alb"
    alb.ingress.kubernetes.io/scheme:           "internet-facing"
    alb.ingress.kubernetes.io/target-type:      "ip"
    alb.ingress.kubernetes.io/listen-ports:     '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/healthcheck-path: "/health"
    alb.ingress.kubernetes.io/success-codes:    "200"
spec:
  ingressClassName: alb        # ← THIS WAS MISSING — required by ALB controller v2+
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: listenme-backend-svc
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: listenme-frontend-svc
                port:
                  number: 80