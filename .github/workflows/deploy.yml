name: Build & Deploy to EKS

on:
  push:
    branches: [main]
  workflow_dispatch:   # allows manual trigger from GitHub UI

env:
  AWS_REGION:       ${{ secrets.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
  ECR_BACKEND:      ${{ secrets.ECR_BACKEND_URL }}
  ECR_FRONTEND:     ${{ secrets.ECR_FRONTEND_URL }}

jobs:

  # ── JOB 1: Build and push Docker images ─────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag (short commit SHA)
        id: meta
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build backend ────────────────────────────────────────────
      - name: Build backend image
        run: |
          docker build \
            -f Dockerfile.backend \
            -t $ECR_BACKEND:${{ steps.meta.outputs.tag }} \
            -t $ECR_BACKEND:latest \
            .

      - name: Push backend image
        run: |
          docker push $ECR_BACKEND:${{ steps.meta.outputs.tag }}
          docker push $ECR_BACKEND:latest

      # ── Inject API URL into config.js before building frontend ───
      - name: Inject API base URL into config.js
        run: |
          sed -i "s|http://YOUR-FRONTEND-ALB-DNS/api|${{ secrets.FRONTEND_URL }}/api|g" \
            frontend/config.js
          echo "config.js updated:"
          grep API_BASE frontend/config.js

      # ── Build frontend ───────────────────────────────────────────
      - name: Build frontend image
        run: |
          docker build \
            -f Dockerfile.frontend \
            -t $ECR_FRONTEND:${{ steps.meta.outputs.tag }} \
            -t $ECR_FRONTEND:latest \
            .

      - name: Push frontend image
        run: |
          docker push $ECR_FRONTEND:${{ steps.meta.outputs.tag }}
          docker push $ECR_FRONTEND:latest


  # ── JOB 2: Deploy to EKS ────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER_NAME

      # ── Namespace ────────────────────────────────────────────────
      - name: Apply namespace
        run: kubectl apply -f k8s/namespace.yaml

      # ── Render and apply secrets ─────────────────────────────────
      - name: Apply Kubernetes secrets
        run: |
          sed \
            -e "s|{{ DB_HOST }}|${{ secrets.DB_HOST }}|g" \
            -e "s|{{ DB_USER }}|${{ secrets.DB_USER }}|g" \
            -e "s|{{ DB_PASSWORD }}|${{ secrets.DB_PASSWORD }}|g" \
            -e "s|{{ SECRET_KEY }}|${{ secrets.SECRET_KEY }}|g" \
            -e "s|{{ S3_BUCKET }}|${{ secrets.S3_BUCKET }}|g" \
            -e "s|{{ AWS_REGION }}|${{ secrets.AWS_REGION }}|g" \
            -e "s|{{ AWS_ACCESS_KEY_ID }}|${{ secrets.AWS_ACCESS_KEY_ID }}|g" \
            -e "s|{{ AWS_SECRET_ACCESS_KEY }}|${{ secrets.AWS_SECRET_ACCESS_KEY }}|g" \
            -e "s|{{ MAIL_USERNAME }}|${{ secrets.MAIL_USERNAME }}|g" \
            -e "s|{{ MAIL_PASSWORD }}|${{ secrets.MAIL_PASSWORD }}|g" \
            -e "s|{{ ADMIN_EMAIL }}|${{ secrets.ADMIN_EMAIL }}|g" \
            -e "s|{{ FRONTEND_URL }}|${{ secrets.FRONTEND_URL }}|g" \
            k8s/secrets.yaml | kubectl apply -f -

      # ── Inject image tags and deploy backend ─────────────────────
      - name: Deploy backend
        run: |
          IMAGE_TAG="${{ needs.build.outputs.image_tag }}"
          sed "s|IMAGE_BACKEND|$ECR_BACKEND:$IMAGE_TAG|g" \
            k8s/backend.yaml | kubectl apply -f -
          kubectl rollout status deployment/listenme-backend -n listenme --timeout=120s

      # ── Inject image tags and deploy frontend ─────────────────────
      - name: Deploy frontend
        run: |
          IMAGE_TAG="${{ needs.build.outputs.image_tag }}"
          sed "s|IMAGE_FRONTEND|$ECR_FRONTEND:$IMAGE_TAG|g" \
            k8s/frontend.yaml | kubectl apply -f -
          kubectl rollout status deployment/listenme-frontend -n listenme --timeout=120s

      # ── Apply ingress ─────────────────────────────────────────────
      - name: Apply ingress
        run: kubectl apply -f k8s/ingress.yaml

      # ── Print app URL ─────────────────────────────────────────────
      - name: Get app URL
        run: |
          echo "Waiting for ALB to provision..."
          sleep 30
          kubectl get ingress listenme-ingress -n listenme
          echo ""
          URL=$(kubectl get ingress listenme-ingress -n listenme \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "still provisioning")
          echo "═══════════════════════════════════════════"
          echo "  APP URL: http://$URL"
          echo "═══════════════════════════════════════════"

      # ── Smoke test ────────────────────────────────────────────────
      - name: Smoke test health endpoint
        run: |
          URL=$(kubectl get ingress listenme-ingress -n listenme \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
          if [ -n "$URL" ]; then
            sleep 10
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://$URL/health" || echo "000")
            echo "Health check status: $STATUS"
            [ "$STATUS" = "200" ] && echo "✅ Deploy successful!" || echo "⚠️  Health check returned $STATUS — ALB may still be provisioning"
          else
            echo "ALB still provisioning — check GitHub Actions again in 2-3 mins"
          fi
